<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Monk Networks</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string
      // into just a query string, and then redirects the browser to the new url
      // with only a query string and hash fragment, e.g.
      // http://www.foo.tld/one/two?a=b&c=d#qwe, becomes
      // http://www.foo.tld/?p=/one/two&q=a=b~and~c=d#qwe
      // Note: this script works when the app is served from a specific subdirectory
      // and also when it is served from the root of a domain.
      // Change the segmentCount to the number of segments in your subdirectory
      // path (e.g. 'project-name' is 1, 'user.github.io/project-name' is 2).
      var segmentCount = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
